<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Escape</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body, html {
            height: 100%;
        }

        .hero {
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
        }

        .content {
            position: relative;
            color: white;
            text-align: center;
            z-index: 1;
        }

        .content h1 {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .content p {
            font-size: 20px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 25px;
            background: #00c853;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 18px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #009624;
        }
    </style>
</head>
<body>

<div class="hero">
    <div class="overlay"></div>

    <div class="content">
        <h1>My website</h1>
        <p>Hello! Welcome</p>
        <a href="#" class="btn">Get Started</a>
    </div>
</div>

</body>
</html>
